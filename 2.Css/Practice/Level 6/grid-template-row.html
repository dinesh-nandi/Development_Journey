<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Template Row</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;            
        }
        #text{
            text-align: center;
        }
        #container{
            height: 550px;
            width: 520px;
            border: 2px solid black;
            background-color: beige;
            display: grid;
            /* grid-template-rows: 200px 150px;
            grid-template-rows: 150px 150px 150px 150px 150px 150px;
            grid-template-rows: repeat(6,40px); */
            grid-template-rows: repeat(6,1fr);
            gap: 5px;
        }
        .box{
            /* height: 80px;
            width: 80px; */
            border: 2px solid black;
            padding: 2px;
        }
        .box1{
            background-color: rgb(255, 147, 107);
        }
        .box2{
            background-color: rgb(85, 251, 251);
        }
        .box3{
            background-color: lightgreen;
        }
        .box4{
            background-color: rgb(242, 147, 194);
        }
        .box5{
            background-color: rgb(255, 255, 128);
        }
        .box6{
            background-color: darkgray;
        }
    </style>
</head>
<body>
    <h3 id="text">Grid Template Row</h3>
    <div id="container">
        <div class="box1 box">box1</div>
        <div class="box2 box">box2</div>
        <div class="box3 box">box3</div>
        <div class="box4 box">box4</div>
        <div class="box5 box">box5</div>
        <div class="box6 box">box6</div>
    </div>

</body>
</html>

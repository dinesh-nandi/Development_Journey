<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Float</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        #container{
            height: 300px;
            width: 500px;
            background-color: hotpink;
            border: 2px solid black;    
        }
        .box{
            height: 100px;
            width: 100px;
            margin: 5px;
            padding: 5px;
            border: 2px solid black;
            background-color: red;
        }
        #box1{
            float:right;
        }
        #box2{
            float: left;
        }
    </style>
</head>
<body>
    <div id="container">
        <div class="box" id="box1">Box 1</div>
        <div class="box" id="box2">Box 2</div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fixed</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        body{
            height: 2000px;
        }
        .box{
            background-color: aqua;
            height: 120px;
            width: 120px;
            border: 2px solid black;
            border-radius: 5px;
            margin: 5px;
            padding: 5px;
            text-align: center;
            line-height: 100px;
            position: fixed;
        }
    </style>
</head>
<body>
    <div class="box">
        Fixed
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relative</title>
    <style>
        .box{
            height: 100px;
            width: 100px;
            border: 2px solid black;
            background-color: red;
            border-radius: 5px;
            padding: 5px;
            margin: 5px;
            text-align: center;
            line-height: 100px;
        }
        #box1{
            position: relative;
            top: 40px;
            left: 80px;
        }
    </style>
</head>
<body>
    <div class="box" id="box1">Relative</div>
    <div class="box" id="box2">Normal</div>
</body>
</html>

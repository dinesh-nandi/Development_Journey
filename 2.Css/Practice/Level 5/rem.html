<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relative Unit: rem</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            font-size: 50px;
        }
        .box{
            border: 2px solid black;
            border-radius: 2px; 
        }
        #first{
            background-color: lightblue;
            height: 200px;
            width: 200px;
            font-size: 10px;
        }
        #second{
            background-color: hotpink;
            width: 50%;
            font-size: 1rem;
        }
    </style>   
</head>
<body>
    Body 
    <div id="first" class="box">
        First div 
        <div id="second" class="box">
            Second Div
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Position: Static</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }
        .box{
            width:120px;
            height:120px;
            background-color:lightblue;
            border:2px solid black;
            text-align:center;
            line-height:120px;
            font-weight:bold;

            /* Static Position */
            position:static;

            /* These properties will NOT work */
            top:80px;
            left:100px;
        }
    </style>
</head>
<body>
    <div class="box">
        Static
    </div>

</body>
</html>

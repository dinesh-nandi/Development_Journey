<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Display Block</title>
    <style>
        .box{
            height: 100px;
            width: 100px;
            border: 2px solid black;
            border-radius: 5px;
            padding: 2px;
            margin: 5px;
            display: block;
        }
        #box1{
            background-color: red;
        }
        #box2{
            background-color: purple;
        }
    </style>
</head>
<body>
    <div class="box" id="box1">
        Box 1
    </div>
    <div class="box" id="box2">
        Box 2
    </div>
</body>
</html>

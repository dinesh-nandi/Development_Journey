<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z-index</title>
    <style>
        .box{
            height: 100px;
            width: 100px;
            border: 2px solid black;
            border-radius: 5px;
            margin: 5px;
            padding: 5px;
            text-align: center;
            position: absolute;
        }
        #box1{
            background-color: red;
            z-index: 1;
            top: 60px;
            left: 20px;
        }
        #box2{
            background-color: yellow;
            z-index: 2;
            top: 20px;
            left: 60px;
        }
    </style>
</head>
<body>
    <div class="box" id="box1">Z-index 1</div>
    <div class="box" id="box2">Z-index 2</div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sticky</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        body{
            height: 2000px;
        }
        .box{
            height: 100px;
            width: 100px;
            background-color: greenyellow;
            border: 2px solid black;
            margin: 5px;
            padding: 5px;
            border-radius: 5px;
            text-align: center;
            line-height: 80px;
            position: sticky;
            top: 0;
        }
    </style>
</head>
<body>
    <div class="box">
        Sticky
    </div>
</body>
</html>

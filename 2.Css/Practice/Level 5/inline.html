<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Display Inline</title>
    <style>
        .box{
            height: 100px;
            width: 100px;
            border: 2px solid black;
            border-radius: 5px;
            padding: 2px;
            margin: 5px;
            display: inline;
        }
        .dabba{
            height: 150px;
            width: 150px;
            border: 2px solid black;
            padding: 5px;
            margin: 5px;
            display: inline-block;
        }
        #box1{
            background-color: red;
        }
        #box2{
            background-color: purple;
        }
        #box3{
            background-color: yellow;
        }
        #box4{
            background-color: green;
        }
            
    </style>
</head>
<body>
    <h4>This is the demonstration of the inline</h4>
    <p>Here the property does not work.</p>
    <div class="box" id="box1">Box 1</div>
    <div class="box" id="box2">Box 2</div>

    <h4>This is the demonstration of the inline-block</h4>
    <p>Here the propert works.</p>
    <div class="dabba" id="box3">Box 3</div>
    <div class="dabba" id="box4">Box 4</div>
</body>
</html>

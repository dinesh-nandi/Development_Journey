<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Padding</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        #padding1{
            font-weight: 900;
            font-size: 40px;
            height: 150px;
            width: 150px;
            background-color: blueviolet;
            padding: 15px 15px 15px 15px;
        }
        #padding2{
            font-weight: 900;
            font-size: 40px;
            height: 150px;
            width: 150px;
            background-color: rgb(21, 223, 196);
        }
    </style>
</head>
<body>
    <div id="padding1">
        With Padding 
    </div>
    <br>
    <div id="padding2">
        Without Padding
    </div>
</body>
</html>

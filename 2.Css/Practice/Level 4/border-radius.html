<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Border Radius</title>
    <style>
        .box{
            height: 150px;
            width: 150px;
            padding: 5px;
            margin: 20px;
        }
        #With{
            background-color: hotpink;
            border: 2px solid black;
            border-radius: 10px;
        }
        #Without{
            background-color: greenyellow;
            border: 2px dashed black;
        }
    </style>
</head>
<body>
     <div class="box" id="With">With Border Radius</div>
    <div class="box" id="Without">Without Border Radius</div>
</body> 
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>margin</title>
    <style>
    *{
        margin: 0;
        padding: 0;
    }
    .demo{
        font-size: 30px;
        font-weight: 800;
        height: 150px;
        width: 150px;
    }
    #first{
        background-color: yellow;
        padding: 2px;
        margin: 20px;
    }
    #second{
        background-color: red;
        padding: 2px;
        margin: 150px 20px 20px 20px;
    }

    </style>
</head>
<body>
    <div id="first" class="demo">
        First
    </div>
    <div id="second" class="demo">
        Second
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Transform</title>
    <style>
        #num1{
            text-transform: uppercase;
        }
        #num2{
            text-transform: lowercase;
        }
        #num3{
            text-transform: capitalize;
        }
        #num4{
            text-transform: none;
        }
    </style>
</head>
<body>
    <h3 class="num" id="num1">Box one</h3>
    <h3 class="num" id="num2">Box two</h3>
    <h3 class="num" id="num3">Box three</h3>
    <h3 class="num" id="num4">Box four</h3>
</body>
</html>

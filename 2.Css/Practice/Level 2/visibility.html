<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visibility</title>
    <style>
        .Box{
            height: 100px;
            width: 100px;

        }
        #box1{
            background-color: red;
            visibility: hidden;
        }
        #box2{
            background-color: yellow;
            visibility: visible;
        }
    </style>
</head>
<body>
    <div id="box1" class="Box">Box 1</div>
    <br>
    <div id="box2" class="Box">Box 2</div>
</body>
</html>

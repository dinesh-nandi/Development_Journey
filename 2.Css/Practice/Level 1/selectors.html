<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selectors</title>
    <style>
        h1{
            color: pink;
        }
        .para{
            color: maroon;
        }
        #div{
            color:aqua;
        }
    </style>
</head>
<body>
    <h1>This is an element selector.</h1>
    <p class="para">class selector and id selector differ by class is the group and id is unique</p>
    <p class="para">This is a class selector</p>
    <div id="div">
        This is a id selector.
    </div>
</body>
</html>

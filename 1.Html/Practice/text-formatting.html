<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Formatting</title>
</head>
<body>
    <b>I am Bold</b><hr>
    <i>I am Italic</i><hr>
    <u>I underline the text</u><hr>
    <s>I cut the text</s><hr>
    <strong>It is similar to the bold but it indicates that the text is important</strong><hr>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colspan and Rowspan</title>
</head>
<body>

    <table border="2">
        <caption>Student Information</caption>

        <!-- Colspan Example -->
        <tr>
            <th colspan="2">Demonstration of Colspan</th>
        </tr>

        <!-- Table Heading -->
        <tr>
            <th>Name</th>
            <th>Subject</th>
            <th>Marks</th>
        </tr>

        <!-- Rowspan Example -->
        <tr>
            <td rowspan="2">Dinesh</td>
            <td>Math</td>
            <td>90</td>
        </tr>

        <tr>
            <td>Science</td>
            <td>85</td>
        </tr>

        <tr>
            <td>Hardik</td>
            <td>Math</td>
            <td>95</td>
        </tr>

        <tr>
            <td>Alok</td>
            <td>English</td>
            <td>80</td>
        </tr>

    </table>

</body>
</html>

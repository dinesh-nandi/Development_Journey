<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Superscript And Subscript</title>
</head>
<body>
    <p>A demonstration of the Superscript :</p>
    <p>(a+b)<sup>2</sup> = (a)<sup>2</sup> + (b)
        <sup>2</sup> + 2ab</p>
    <hr>
    <p>A demonstartion of the Subscript :</p>
    <p>CH<sub>4</sub> + O<sub>2</sub> = H 
        <sub>2</sub>O + CO<sub>2</sub>
    </p>        
</body>
</html>
